namespaceOverride: ""

image:
  repositoryPrefix: "newproject"
  pullPolicy: IfNotPresent
  tag: "latest"

services:
  discovery-server:
    enabled: true
    port: 8761
    actuatorPort: 8761
    pathPrefix: ""
    image: {}
    env: {}
  config-server:
    enabled: true
    port: 8888
    actuatorPort: 8888
    image: {}
    env:
      EUREKA_SERVER_URL: "http://discovery-server:8761/eureka/"
  api-gateway:
    enabled: true
    port: 8080
    actuatorPort: 8080
    image: {}
    env:
      EUREKA_SERVER_URL: "http://discovery-server:8761/eureka/"
      CONFIG_SERVER_URL: "http://config-server:8888"
      # For local Kubernetes, Bitnami's Redis chart exposes `redis-master` by default.
      REDIS_HOST: "redis-master"
      REDIS_PORT: "6379"
      OTLP_TRACING_ENDPOINT: "http://jaeger:4318/v1/traces"
      GATEWAY_SECRET: "dev-gateway-secret"
      JWT_SECRET: "REPLACE_ME_BASE64"
  auth-service:
    enabled: true
    port: 8084
    actuatorPort: 8084
    image: {}
    env:
      AUTH_DB_HOST: "mysql-auth"
      AUTH_DB_PORT: "3306"
      AUTH_DB_USERNAME: "root"
      AUTH_DB_PASSWORD: "root"
      EUREKA_SERVER_URL: "http://discovery-server:8761/eureka/"
      CONFIG_SERVER_URL: "http://config-server:8888"
      OTLP_TRACING_ENDPOINT: "http://jaeger:4318/v1/traces"
      GATEWAY_SECRET: "dev-gateway-secret"
      JWT_SECRET: "REPLACE_ME_BASE64"
  user-service:
    enabled: true
    port: 8081
    actuatorPort: 8081
    image: {}
    env:
      USER_DB_HOST: "mysql-user"
      USER_DB_PORT: "3306"
      USER_DB_USERNAME: "root"
      USER_DB_PASSWORD: "root"
      EUREKA_SERVER_URL: "http://discovery-server:8761/eureka/"
      CONFIG_SERVER_URL: "http://config-server:8888"
      OTLP_TRACING_ENDPOINT: "http://jaeger:4318/v1/traces"
      GATEWAY_SECRET: "dev-gateway-secret"
  order-service:
    enabled: true
    port: 8082
    actuatorPort: 8082
    image: {}
    env:
      ORDER_DB_HOST: "mysql-order"
      ORDER_DB_PORT: "3306"
      ORDER_DB_USERNAME: "root"
      ORDER_DB_PASSWORD: "root"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      EUREKA_SERVER_URL: "http://discovery-server:8761/eureka/"
      CONFIG_SERVER_URL: "http://config-server:8888"
      OTLP_TRACING_ENDPOINT: "http://jaeger:4318/v1/traces"
      GATEWAY_SECRET: "dev-gateway-secret"
  inventory-service:
    enabled: true
    port: 8083
    actuatorPort: 8083
    image: {}
    env:
      MONGO_HOST: "mongo-inventory"
      MONGO_PORT: "27017"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      EUREKA_SERVER_URL: "http://discovery-server:8761/eureka/"
      CONFIG_SERVER_URL: "http://config-server:8888"
      OTLP_TRACING_ENDPOINT: "http://jaeger:4318/v1/traces"
      GATEWAY_SECRET: "dev-gateway-secret"

replicaCount: 1

resources: {}

probes:
  readiness:
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 24
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6

serviceAccount:
  create: false
  name: ""

ingress:
  enabled: false
  className: ""
  host: "ecommerce.local"

# Optional in-cluster dependencies for local Kubernetes (minikube).
# These keep the Helm demo self-contained without relying on external DB/Kafka.
deps:
  redis:
    enabled: true
    image: "redis:7.2"

  mongo:
    enabled: true
    image: "mongo:7.0"
    storageSize: "1Gi"

  mysql:
    enabled: true
    image: "mysql:8.4"
    rootPassword: "root"
    storageSize: "1Gi"
    databases:
      - name: mysql-user
        database: userdb
      - name: mysql-order
        database: orderdb
      - name: mysql-auth
        database: authdb

  kafka:
    enabled: true
    kafkaImage: "confluentinc/cp-kafka:7.6.1"
    zookeeperImage: "confluentinc/cp-zookeeper:7.6.1"
