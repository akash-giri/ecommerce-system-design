{{- if and .Values.deps.observability.enabled .Values.deps.observability.grafana.image }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: {{ include "ecommerce.namespace" . }}
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: "ecommerce"
        orgId: 1
        folder: "Ecommerce"
        type: file
        disableDeletion: true
        editable: true
        options:
          path: /var/lib/grafana/dashboards/ecommerce
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-ecommerce
  namespace: {{ include "ecommerce.namespace" . }}
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  ecommerce-overview.json: |
    {
      "uid": "ecommerce-overview",
      "title": "Ecommerce Overview",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "tags": ["ecommerce", "spring", "micrometer"],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request Rate (req/s) by Service",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(http_server_requests_seconds_count{uri!~\"/actuator.*\"}[1m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "5xx Error Rate (%) by Service",
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "100 * (sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[2m])) by (job) / clamp_min(sum(rate(http_server_requests_seconds_count[2m])) by (job), 0.001))",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Latency p95 (seconds) by Service",
          "gridPos": { "x": 0, "y": 16, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{uri!~\"/actuator.*\"}[5m])) by (le, job))",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "JVM Heap Used (MiB) by Service",
          "gridPos": { "x": 0, "y": 24, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(jvm_memory_used_bytes{area=\"heap\"}) by (job) / 1024 / 1024",
              "legendFormat": "{{job}}"
            }
          ]
        }
      ]
    }
{{- end }}
