{{- if .Values.deps.mysql.enabled }}
{{- range $db := .Values.deps.mysql.databases }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $db.name }}-secret
  namespace: {{ include "ecommerce.namespace" $ }}
  labels:
    {{- include "ecommerce.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $db.name }}
type: Opaque
stringData:
  mysql-root-password: {{ $.Values.deps.mysql.rootPassword | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $db.name }}
  namespace: {{ include "ecommerce.namespace" $ }}
  labels:
    {{- include "ecommerce.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $db.name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: {{ $db.name }}
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $db.name }}
  namespace: {{ include "ecommerce.namespace" $ }}
  labels:
    {{- include "ecommerce.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $db.name }}
spec:
  serviceName: {{ $db.name }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ $db.name }}
  template:
    metadata:
      labels:
        {{- include "ecommerce.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $db.name }}
    spec:
      containers:
        - name: mysql
          image: {{ $.Values.deps.mysql.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $db.name }}-secret
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: {{ $db.database | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 60
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "ecommerce.labels" $ | nindent 10 }}
          app.kubernetes.io/component: {{ $db.name }}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $.Values.deps.mysql.storageSize | quote }}
{{- end }}
{{- end }}

