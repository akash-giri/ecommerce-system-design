global:
  resolve_timeout: 1m

route:
  receiver: "local"
  group_by: ["alertname", "job"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 2h

receivers:
  - name: "local"
    # Local/demo receiver.
    # For real notifications, replace this with Slack/Email/PagerDuty/etc.
    webhook_configs:
      - url: "http://127.0.0.1:65535/"
        send_resolved: true

